<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- ========== 1. 主体渐变（更深邃，金属感更强） ========== -->
    <linearGradient id="sGradMain" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D8E0E8"/>
      <stop offset="20%" stop-color="#9AABB8"/>
      <stop offset="50%" stop-color="#5A6B78"/>
      <stop offset="80%" stop-color="#2A3A48"/>
      <stop offset="100%" stop-color="#0F1A24"/>
    </linearGradient>

    <!-- 高光渐变（降低透明度，更克制） -->
    <linearGradient id="sHighlight1" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- 辅助环境光 -->
    <linearGradient id="sHighlight2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A6070" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#8AA0B0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- 深邃阴影 -->
    <radialGradient id="sShadow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0A1018" stop-opacity="0"/>
      <stop offset="65%" stop-color="#0A1018" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0A1018" stop-opacity="0.75"/>
    </radialGradient>

    <!-- 边缘光晕（更柔和） -->
    <filter id="edgeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 内部柔光 -->
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 粒子光晕 -->
    <filter id="particleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ========== 2. 纹理图案 ========== -->
    <pattern id="circuitGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#A0B8C8" stroke-width="0.5" opacity="0.12"/>
      <circle cx="10" cy="10" r="1" fill="#C0D4E0" opacity="0.25"/>
    </pattern>

    <pattern id="dotMatrix" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1" fill="#FFFFFF" opacity="0.18"/>
    </pattern>

    <pattern id="techStripes" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#3A5A6A" stroke-width="1" opacity="0.08"/>
    </pattern>

    <!-- 主体剪裁路径（微调曲线，让 S 更流畅） -->
    <clipPath id="sClip">
      <path d="
        M 395 78
        C 325 48, 215 68, 185 142
        C 155 216, 215 262, 298 292
        C 382 322, 442 378, 422 452
        C 402 526, 308 562, 218 542
        C 158 527, 118 482, 108 442
        C 103 412, 118 392, 138 392
        C 158 392, 168 412, 173 437
        C 178 462, 203 492, 243 502
        C 298 517, 358 492, 368 452
        C 383 402, 338 357, 278 327
        C 208 292, 138 242, 168 157
        C 193 87, 288 72, 358 102
        C 408 124, 433 162, 428 192
        C 423 217, 403 232, 383 227
        C 363 222, 358 202, 360 187
        C 362 172, 378 154, 388 152
        Z
      "/>
    </clipPath>
  </defs>

  <!-- ==================== 镜像变换（保留原结构） ==================== -->
  <g transform="translate(600, 0) scale(-1, 1)">

    <!-- 主 S 填充路径（已优化曲线） -->
    <path d="
      M 208 78
      C 278 48, 378 68, 408 142
      C 438 216, 378 262, 298 292
      C 218 322, 158 378, 178 452
      C 198 526, 288 562, 378 542
      C 438 527, 478 482, 488 442
      C 493 412, 478 392, 458 392
      C 438 392, 428 412, 423 437
      C 418 462, 393 492, 353 502
      C 298 517, 238 492, 228 452
      C 213 402, 258 357, 318 327
      C 388 292, 458 242, 428 157
      C 403 87, 308 72, 238 102
      C 188 124, 163 162, 168 192
      C 173 217, 193 232, 213 227
      C 233 222, 238 202, 236 187
      C 234 172, 218 154, 208 152
      Z
    " fill="url(#sGradMain)" filter="url(#edgeGlow)"/>

    <!-- 内部高光层（立体感增强） -->
    <path d="
      M 228 102
      C 288 78, 368 92, 392 148
      C 416 204, 368 248, 302 278
      C 238 308, 182 362, 202 438
      C 218 494, 288 528, 362 512
      C 412 502, 448 468, 458 442
      C 463 428, 452 412, 442 412
      C 432 412, 424 428, 420 445
      C 412 468, 382 488, 348 494
      C 298 504, 248 482, 238 448
      C 222 402, 268 362, 322 332
      C 388 300, 442 258, 418 172
      C 398 102, 318 88, 258 112
      C 218 128, 198 158, 202 180
      C 205 195, 212 202, 220 198
      C 228 194, 232 182, 228 172
      C 224 162, 218 154, 212 152
      Z
    " fill="url(#sHighlight1)" opacity="0.65"/>

    <!-- 内部阴影（加深轮廓） -->
    <path d="
      M 212 118
      C 268 88, 348 104, 372 152
      C 398 198, 358 238, 302 262
      C 248 288, 198 338, 215 408
      C 228 458, 282 488, 342 478
      C 382 470, 412 442, 422 422
    " fill="none" stroke="#081018" stroke-width="16" stroke-linecap="round" filter="url(#softGlow)" opacity="0.2"/>

    <!-- ========== 纹理覆盖层 ========== -->
    <g clip-path="url(#sClip)" transform="scale(-1,1)">
      <rect x="80" y="40" width="480" height="560" fill="url(#circuitGrid)"/>
      <rect x="80" y="40" width="480" height="560" fill="url(#dotMatrix)"/>
      <rect x="80" y="40" width="480" height="560" fill="url(#techStripes)"/>
      <rect x="80" y="40" width="480" height="560" fill="url(#sHighlight2)" opacity="0.4"/>

      <!-- 细腻的水平光带 -->
      <g opacity="0.15">
        <line x1="140" y1="140" x2="520" y2="140" stroke="#FFFFFF" stroke-width="1"/>
        <line x1="120" y1="200" x2="500" y2="200" stroke="#FFFFFF" stroke-width="0.6"/>
        <line x1="110" y1="280" x2="510" y2="280" stroke="#FFFFFF" stroke-width="0.8"/>
        <line x1="130" y1="370" x2="530" y2="370" stroke="#FFFFFF" stroke-width="0.7"/>
        <line x1="170" y1="440" x2="540" y2="440" stroke="#FFFFFF" stroke-width="0.9"/>
        <line x1="210" y1="510" x2="500" y2="510" stroke="#FFFFFF" stroke-width="0.6"/>
      </g>

      <!-- 光晕光斑 -->
      <circle cx="300" cy="250" r="90" fill="#FFFFFF" opacity="0.04" filter="url(#particleGlow)"/>
      <circle cx="360" cy="420" r="110" fill="#A0D0FF" opacity="0.03"/>
      <circle cx="240" cy="140" r="75" fill="#FFFFFF" opacity="0.05"/>
    </g>

    <!-- ========== 外部粒子系统（保留倾向变化） ========== -->
    <g filter="url(#particleGlow)">
      <circle cx="180" cy="70" r="3" fill="#FFFFFF" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3;5;3" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="460" cy="120" r="2.5" fill="#FFFFFF" opacity="0.7">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="510" cy="300" r="4" fill="#C0D8F0" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="125" cy="380" r="3.5" fill="#FFFFFF" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.25;0.85" dur="1.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="245" cy="565" r="2.8" fill="#FFFFFF" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="455" cy="525" r="3" fill="#A0C8E8" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="385" cy="72" r="2" fill="#FFFFFF" opacity="0.8">
        <animate attributeName="cy" values="72;62;72" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="225" cy="525" r="2.2" fill="#FFFFFF" opacity="0.6">
        <animate attributeName="cx" values="225;235;225" dur="2.7s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- 微弱的角度线 -->
    <g opacity="0.35">
      <line x1="158" y1="98" x2="148" y2="88" stroke="#FFFFFF" stroke-width="0.8"/>
      <line x1="482" y1="178" x2="492" y2="168" stroke="#FFFFFF" stroke-width="0.8"/>
      <line x1="492" y1="398" x2="502" y2="388" stroke="#FFFFFF" stroke-width="0.8"/>
      <line x1="258" y1="552" x2="248" y2="562" stroke="#FFFFFF" stroke-width="0.8"/>
    </g>

    <!-- 脑电波弧线（更隐晦） -->
    <g opacity="0.15">
      <path d="M 80 200 Q 120 180, 140 210 T 180 230" fill="none" stroke="#FFFFFF" stroke-width="1"/>
      <path d="M 520 280 Q 550 260, 560 290 T 580 310" fill="none" stroke="#FFFFFF" stroke-width="1"/>
      <path d="M 100 480 Q 130 460, 150 490 T 190 510" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    </g>

    <!-- 边缘高光强化 -->
    <path d="
      M 208 78
      C 278 48, 378 68, 408 142
      C 438 216, 378 262, 298 292
      C 218 322, 158 378, 178 452
      C 198 526, 288 562, 378 542
      C 438 527, 478 482, 488 442
    " fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35" filter="url(#edgeGlow)"/>

    <!-- 内部高光线条（更细腻） -->
    <path d="
      M 228 102
      C 288 78, 368 92, 392 148
      C 416 204, 368 248, 302 278
      C 238 308, 182 362, 202 438
      C 218 494, 288 528, 362 512
      C 412 502, 448 468, 458 442
    " fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.45" stroke-linecap="round"/>

    <!-- 内阴影深度增强 -->
    <path d="
      M 215 85
      C 275 57, 375 78, 405 145
      C 435 208, 375 258, 298 288
      C 222 318, 162 378, 182 452
      C 200 518, 286 558, 376 540
      C 436 525, 476 480, 486 440
    " fill="none" stroke="#050A10" stroke-width="7" opacity="0.15" filter="url(#softGlow)"/>

    <!-- 动态粒子流（沿 S 路径） -->
    <g>
      <circle r="2" fill="#FFFFFF" filter="url(#particleGlow)">
        <animateMotion dur="4s" repeatCount="indefinite" path="
          M 208 78
          C 278 48, 378 68, 408 142
          C 438 216, 378 262, 298 292
          C 218 322, 158 378, 178 452
          C 198 526, 288 562, 378 542
          C 438 527, 478 482, 488 442
        "/>
      </circle>
      <circle r="1.5" fill="#80B0D0" opacity="0.8">
        <animateMotion dur="5s" repeatCount="indefinite" begin="1.5s" path="
          M 208 78
          C 278 48, 378 68, 408 142
          C 438 216, 378 262, 298 292
          C 218 322, 158 378, 178 452
          C 198 526, 288 562, 378 542
          C 438 527, 478 482, 488 442
        "/>
      </circle>
      <circle r="2.2" fill="#FFFFFF" opacity="0.55">
        <animateMotion dur="3.5s" repeatCount="indefinite" begin="3s" path="
          M 208 78
          C 278 48, 378 68, 408 142
          C 438 216, 378 262, 298 292
          C 218 322, 158 378, 178 452
          C 198 526, 288 562, 378 542
          C 438 527, 478 482, 488 442
        "/>
      </circle>
    </g>

    <!-- 极简取景框（更低调） -->
    <rect x="28" y="28" width="544" height="544" rx="24" fill="none" stroke="#8098A8" stroke-width="0.6" opacity="0.08"/>
    <circle cx="578" cy="28" r="3.5" fill="#FFFFFF" opacity="0.12"/>
    <circle cx="28" cy="578" r="3.5" fill="#FFFFFF" opacity="0.12"/>

  </g>
</svg>