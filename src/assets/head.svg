<svg xmlns="http://www.w3.org/2000/svg" viewBox="45 150 710 250">
  <defs>
    <!-- 主体渐变 -->
    <linearGradient id="sGradMain" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D8E0E8"/>
      <stop offset="20%" stop-color="#9AABB8"/>
      <stop offset="50%" stop-color="#5A6B78"/>
      <stop offset="80%" stop-color="#2A3A48"/>
      <stop offset="100%" stop-color="#0F1A24"/>
    </linearGradient>

    <!-- 高光渐变 -->
    <linearGradient id="sHighlight1" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- 辅助环境光 -->
    <linearGradient id="sHighlight2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A6070" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#8AA0B0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- 文字渐变 -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8E0E8"/>
      <stop offset="30%" stop-color="#9AABB8"/>
      <stop offset="70%" stop-color="#5A6B78"/>
      <stop offset="100%" stop-color="#2A3A48"/>
    </linearGradient>

    <linearGradient id="textGradLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B8C8D8"/>
      <stop offset="100%" stop-color="#4A5A68"/>
    </linearGradient>

    <!-- 边缘光晕 -->
    <filter id="edgeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 内部柔光 -->
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 粒子光晕 -->
    <filter id="particleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 文字光晕 -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 纹理图案 -->
    <pattern id="circuitGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#A0B8C8" stroke-width="0.5" opacity="0.12"/>
      <circle cx="10" cy="10" r="1" fill="#C0D4E0" opacity="0.25"/>
    </pattern>

    <pattern id="dotMatrix" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1" fill="#FFFFFF" opacity="0.18"/>
    </pattern>

    <pattern id="techStripes" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#3A5A6A" stroke-width="1" opacity="0.08"/>
    </pattern>

    <!-- 新增：六边形网格 -->
    <pattern id="hexGrid" x="0" y="0" width="28" height="48" patternUnits="userSpaceOnUse">
      <path d="M 14 0 L 28 8 L 28 24 L 14 32 L 0 24 L 0 8 Z" fill="none" stroke="#6A8A9A" stroke-width="0.4" opacity="0.08"/>
      <circle cx="14" cy="16" r="0.8" fill="#8AA8B8" opacity="0.15"/>
    </pattern>

    <!-- 新增：细密交叉线 -->
    <pattern id="crossLines" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="40" stroke="#5A7A8A" stroke-width="0.3" opacity="0.06"/>
      <line x1="40" y1="0" x2="0" y2="40" stroke="#5A7A8A" stroke-width="0.3" opacity="0.06"/>
    </pattern>

    <!-- 新增：微光点阵 -->
    <pattern id="microDots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.5" fill="#FFFFFF" opacity="0.12"/>
      <circle cx="6" cy="6" r="0.4" fill="#A0C0D0" opacity="0.08"/>
    </pattern>

    <!-- 新增：内发光线条滤镜 -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <!-- 主体剪裁路径（已缩放） -->
    <clipPath id="sClip">
      <path d="
        M 252.8 54.7
        C 207.3 35.2, 142.3 48.2, 122.8 96.3
        C 103.3 144.4, 142.3 174.3, 194.3 193.8
        C 246.3 213.3, 285.3 249.7, 272.3 297.8
        C 259.3 345.9, 200.8 369.3, 142.3 356.3
        C 103.3 346.6, 77.3 317.3, 70.8 291.3
        C 66.6 271.8, 77.3 258.8, 90.3 258.8
        C 103.3 258.8, 109.8 271.8, 113.1 288.1
        C 116.4 304.4, 132.6 323.9, 158.6 330.4
        C 194.3 338.4, 232.8 323.9, 239.3 297.8
        C 249.1 264.5, 220.1 234.6, 181.1 215.1
        C 135.6 193.8, 90.3 167.1, 109.8 106.1
        C 126.1 62.7, 187.8 50.8, 233.3 72.1
        C 264.5 87.7, 280.8 112.4, 278.3 132.0
        C 275.8 149.2, 264.5 160.2, 250.3 156.9
        C 236.1 153.6, 233.3 141.6, 234.5 132.0
        C 235.8 122.4, 246.3 109.1, 251.6 107.8
        Z
      "/>
    </clipPath>
  </defs>

  <!-- ========== 主S填充（已缩放坐标） ========== -->
  <path d="
    M 252.8 54.7
    C 207.3 35.2, 142.3 48.2, 122.8 96.3
    C 103.3 144.4, 142.3 174.3, 194.3 193.8
    C 246.3 213.3, 285.3 249.7, 272.3 297.8
    C 259.3 345.9, 200.8 369.3, 142.3 356.3
    C 103.3 346.6, 77.3 317.3, 70.8 291.3
    C 66.6 271.8, 77.3 258.8, 90.3 258.8
    C 103.3 258.8, 109.8 271.8, 113.1 288.1
    C 116.4 304.4, 132.6 323.9, 158.6 330.4
    C 194.3 338.4, 232.8 323.9, 239.3 297.8
    C 249.1 264.5, 220.1 234.6, 181.1 215.1
    C 135.6 193.8, 90.3 167.1, 109.8 106.1
    C 126.1 62.7, 187.8 50.8, 233.3 72.1
    C 264.5 87.7, 280.8 112.4, 278.3 132.0
    C 275.8 149.2, 264.5 160.2, 250.3 156.9
    C 236.1 153.6, 233.3 141.6, 234.5 132.0
    C 235.8 122.4, 246.3 109.1, 251.6 107.8
    Z
  " fill="url(#sGradMain)" filter="url(#edgeGlow)"/>

  <!-- 内部高光层（已缩放） -->
  <path d="
    M 239.8 74.3
    C 200.8 58.7, 148.8 67.8, 133.3 104.2
    C 117.8 140.6, 148.8 161.2, 191.8 180.7
    C 234.8 200.2, 270.8 228.8, 257.8 278.2
    C 247.3 314.6, 201.8 336.7, 153.8 326.3
    C 121.3 318.3, 97.8 296.3, 91.3 279.3
    C 87.1 270.3, 94.3 259.8, 100.8 259.8
    C 107.3 259.8, 112.3 270.3, 114.8 281.3
    C 120.0 296.3, 139.5 309.3, 161.5 313.3
    C 194.3 319.8, 226.3 303.8, 232.8 281.3
    C 242.6 251.3, 212.8 225.3, 177.8 207.8
    C 137.6 191.3, 102.5 165.2, 118.3 116.8
    C 131.3 79.8, 183.3 72.1, 222.3 87.7
    C 248.3 98.2, 261.3 117.7, 258.8 132.0
    C 256.9 141.9, 252.3 147.4, 247.1 144.9
    C 241.9 142.4, 239.1 134.6, 240.4 128.2
    C 241.6 121.8, 248.3 111.3, 251.6 110.0
    Z
  " fill="url(#sHighlight1)" opacity="0.65"/>

  <!-- 内部阴影（已缩放） -->
  <path d="
    M 250.2 80.7
    C 213.8 61.2, 161.8 71.6, 146.3 104.9
    C 130.8 134.9, 156.8 160.9, 193.3 176.4
    C 228.3 193.3, 260.8 225.8, 249.8 271.3
    C 241.3 303.8, 206.3 323.3, 167.3 316.8
    C 141.3 311.6, 121.8 293.3, 115.3 280.3
  " fill="none" stroke="#081018" stroke-width="10.4" stroke-linecap="round" filter="url(#softGlow)" opacity="0.2"/>

  <!-- ========== 纹理覆盖层（丰富版） ========== -->
  <g clip-path="url(#sClip)">
    <!-- 原有纹理 -->
    <rect x="50" y="26" width="312" height="364" fill="url(#circuitGrid)"/>
    <rect x="50" y="26" width="312" height="364" fill="url(#dotMatrix)"/>
    <rect x="50" y="26" width="312" height="364" fill="url(#techStripes)"/>
    <rect x="50" y="26" width="312" height="364" fill="url(#sHighlight2)" opacity="0.4"/>

    <!-- 新增纹理 -->
    <rect x="50" y="26" width="312" height="364" fill="url(#hexGrid)" opacity="0.7"/>
    <rect x="50" y="26" width="312" height="364" fill="url(#crossLines)" opacity="0.6"/>
    <rect x="50" y="26" width="312" height="364" fill="url(#microDots)" opacity="0.5"/>

    <!-- 细腻的水平光带 -->
    <g opacity="0.15">
      <line x1="89" y1="91" x2="338" y2="91" stroke="#FFFFFF" stroke-width="0.65"/>
      <line x1="76" y1="130" x2="325" y2="130" stroke="#FFFFFF" stroke-width="0.39"/>
      <line x1="69.5" y1="182" x2="331.5" y2="182" stroke="#FFFFFF" stroke-width="0.52"/>
      <line x1="82.5" y1="240.5" x2="344.5" y2="240.5" stroke="#FFFFFF" stroke-width="0.455"/>
      <line x1="108.5" y1="286" x2="351" y2="286" stroke="#FFFFFF" stroke-width="0.585"/>
      <line x1="134.5" y1="331.5" x2="325" y2="331.5" stroke="#FFFFFF" stroke-width="0.39"/>
    </g>

    <!-- 新增：内发光线条 -->
    <g opacity="0.12" filter="url(#innerGlow)">
      <path d="M 150 100 Q 200 120, 220 160" fill="none" stroke="#C0D8E8" stroke-width="1"/>
      <path d="M 280 200 Q 320 240, 300 300" fill="none" stroke="#C0D8E8" stroke-width="0.8"/>
      <path d="M 180 320 Q 140 360, 160 400" fill="none" stroke="#C0D8E8" stroke-width="0.6"/>
    </g>

    <!-- 光晕光斑 -->
    <circle cx="193" cy="162.5" r="58.5" fill="#FFFFFF" opacity="0.04" filter="url(#particleGlow)"/>
    <circle cx="232" cy="273" r="71.5" fill="#A0D0FF" opacity="0.03"/>
    <circle cx="154" cy="91" r="48.75" fill="#FFFFFF" opacity="0.05"/>

    <!-- 新增：额外光斑 -->
    <circle cx="280" cy="200" r="40" fill="#80B0D0" opacity="0.03" filter="url(#particleGlow)"/>
    <circle cx="120" cy="300" r="50" fill="#FFFFFF" opacity="0.02"/>
  </g>

  <!-- ========== 外部粒子系统（精确缩放位置） ========== -->
  <g filter="url(#particleGlow)">
    <circle cx="115.0" cy="49.5" r="3" fill="#FFFFFF" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;5;3" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="297.0" cy="82.0" r="2.5" fill="#FFFFFF" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56.5" cy="199.0" r="4" fill="#C0D8F0" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="79.2" cy="251.0" r="3.5" fill="#FFFFFF" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.25;0.85" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="157.2" cy="371.2" r="2.8" fill="#FFFFFF" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="92.2" cy="345.2" r="3" fill="#A0C8E8" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="248.2" cy="50.8" r="2" fill="#FFFFFF" opacity="0.8">
      <animate attributeName="cy" values="50.8;44.3;50.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="144.2" cy="345.2" r="2.2" fill="#FFFFFF" opacity="0.6">
      <animate attributeName="cx" values="144.2;150.7;144.2" dur="2.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 微弱的角度线 -->
  <g opacity="0.35">
    <line x1="100.7" y1="67.7" x2="94.2" y2="61.2" stroke="#FFFFFF" stroke-width="0.8"/>
    <line x1="311.3" y1="119.7" x2="317.8" y2="113.2" stroke="#FFFFFF" stroke-width="0.8"/>
    <line x1="317.8" y1="262.7" x2="324.3" y2="256.2" stroke="#FFFFFF" stroke-width="0.8"/>
    <line x1="165.7" y1="362.8" x2="159.2" y2="369.3" stroke="#FFFFFF" stroke-width="0.8"/>
  </g>

  <!-- 脑电波弧线 -->
  <g opacity="0.15">
    <path d="M 50.0 134.0 Q 76.0 121.0, 89.0 140.5 T 115.0 153.5" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M 336.0 186.0 Q 355.5 173.0, 362.0 192.5 T 375.0 205.5" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M 63.0 316.0 Q 82.5 303.0, 95.5 322.5 T 121.5 335.5" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
  </g>

  <!-- 边缘高光强化 -->
  <path d="
    M 252.8 54.7
    C 207.3 35.2, 142.3 48.2, 122.8 96.3
    C 103.3 144.4, 142.3 174.3, 194.3 193.8
    C 246.3 213.3, 285.3 249.7, 272.3 297.8
    C 259.3 345.9, 200.8 369.3, 142.3 356.3
    C 103.3 346.6, 77.3 317.3, 70.8 291.3
  " fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35" filter="url(#edgeGlow)"/>

  <!-- 内部高光线条 -->
  <path d="
    M 239.8 74.3
    C 200.8 58.7, 148.8 67.8, 133.3 104.2
    C 117.8 140.6, 148.8 161.2, 191.8 180.7
    C 234.8 200.2, 270.8 228.8, 257.8 278.2
    C 247.3 314.6, 201.8 336.7, 153.8 326.3
    C 121.3 318.3, 97.8 296.3, 91.3 279.3
  " fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.45" stroke-linecap="round"/>

  <!-- 内阴影深度增强 -->
  <path d="
    M 248.2 59.3
    C 209.2 40.1, 144.2 53.7, 124.7 98.3
    C 106.2 140.2, 145.2 167.7, 194.3 187.2
    C 243.3 206.7, 283.3 245.7, 270.3 293.8
    C 258.3 336.7, 202.3 362.7, 143.8 351.0
    C 105.5 341.3, 78.5 313.8, 72.8 290.0
  " fill="none" stroke="#050A10" stroke-width="4.55" opacity="0.15" filter="url(#softGlow)"/>

  <!-- 动态粒子流（沿S路径，已缩放） -->
  <g>
    <circle r="2" fill="#FFFFFF" filter="url(#particleGlow)">
      <animateMotion dur="4s" repeatCount="indefinite" path="
        M 252.8 54.7
        C 207.3 35.2, 142.3 48.2, 122.8 96.3
        C 103.3 144.4, 142.3 174.3, 194.3 193.8
        C 246.3 213.3, 285.3 249.7, 272.3 297.8
        C 259.3 345.9, 200.8 369.3, 142.3 356.3
        C 103.3 346.6, 77.3 317.3, 70.8 291.3
      "/>
    </circle>
    <circle r="1.5" fill="#80B0D0" opacity="0.8">
      <animateMotion dur="5s" repeatCount="indefinite" begin="1.5s" path="
        M 252.8 54.7
        C 207.3 35.2, 142.3 48.2, 122.8 96.3
        C 103.3 144.4, 142.3 174.3, 194.3 193.8
        C 246.3 213.3, 285.3 249.7, 272.3 297.8
        C 259.3 345.9, 200.8 369.3, 142.3 356.3
        C 103.3 346.6, 77.3 317.3, 70.8 291.3
      "/>
    </circle>
    <circle r="2.2" fill="#FFFFFF" opacity="0.55">
      <animateMotion dur="3.5s" repeatCount="indefinite" begin="3s" path="
        M 252.8 54.7
        C 207.3 35.2, 142.3 48.2, 122.8 96.3
        C 103.3 144.4, 142.3 174.3, 194.3 193.8
        C 246.3 213.3, 285.3 249.7, 272.3 297.8
        C 259.3 345.9, 200.8 369.3, 142.3 356.3
        C 103.3 346.6, 77.3 317.3, 70.8 291.3
      "/>
    </circle>
  </g>
  <!-- ========== 文字 "ong's" ========== -->
  <text x="295" y="200" font-size="100" fill="url(#textGrad)" 
        font-family="'Playfair Display', Georgia, serif" font-weight="700" font-style="italic"
        filter="url(#textGlow)" letter-spacing="-1">ong's</text>
  
  <text x="295" y="198" font-size="100" fill="#FFFFFF" opacity="0.2"
        font-family="'Playfair Display', Georgia, serif" font-weight="700" font-style="italic"
        letter-spacing="-1">ong's</text>

  <!-- ========== 文字 "BLOG" ========== -->
  <text x="310" y="360" font-size="150" fill="url(#textGradLight)" 
